trigger:
- main

pool:
  name: ec2-agent-pool

variables:
  imageRepository: springboot-app
  dockerHubUser: shaikhaamer
  imageTag: latest

stages:

# ==========================
# BUILD STAGE
# ==========================
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: BuildAndPush

    steps:

    - checkout: self

    - script: |
        java -version
        mvn -version
        docker --version
      displayName: Verify Tools

    - task: Maven@4
      displayName: Maven Build
      inputs:
        mavenPomFile: 'Small Java Project/java-app/pom.xml'
        goals: 'clean package'

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        containerRegistry: 'dockerhub-connection'
        repository: '$(dockerHubUser)/$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

# ==========================
# DEPLOY STAGE
# ==========================
- stage: Deploy
  displayName: Deploy Application
  dependsOn: Build

  jobs:
  - job: Deploy

    steps:

    - script: |
        echo "Stopping old container..."

        docker stop springboot || true
        docker rm springboot || true

        echo "Pulling latest image..."

        docker pull $(dockerHubUser)/$(imageRepository):latest

        echo "Starting new container..."

        docker run -d \
          --name springboot \
          -p 8080:8080 \
          --restart unless-stopped \
          $(dockerHubUser)/$(imageRepository):latest

        docker ps
      displayName: Deploy Container