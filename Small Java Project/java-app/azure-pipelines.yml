trigger:
- main

pool:
  name: ec2-agent-pool

variables:
  imageRepository: springboot-app
  dockerHubUser: shaikhaamer
  imageTag: latest

stages:

# ==========================
# BUILD STAGE
# ==========================
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: BuildAndPush

    steps:

    - checkout: self

    - script: |
        java -version
        mvn -version
        docker --version
      displayName: Verify Tools

    - script: |
        cd "Small Java Project/java-app"
        mvn clean package
      displayName: 'Maven Build'

    - script: |
        docker image build -t $(dockerHubUser)/$(imageRepository):$(Build.BuildId) .
      displayName: Build and Push Image

# ==========================
# DEPLOY STAGE
# ==========================
- stage: Deploy
  displayName: Deploy Application
  dependsOn: Build

  jobs:
  - job: Deploy

    steps:

    - script: |
        echo "Stopping old container..."

        docker stop springboot || true
        docker rm springboot || true

        echo "Pulling latest image..."

        docker pull $(dockerHubUser)/$(imageRepository):$(Build.BuildId)

        echo "Starting new container..."

        docker run -d \
          --name springboot \
          -p 8080:8080 \
          --restart unless-stopped \
          $(dockerHubUser)/$(imageRepository):$(Build.BuildId)

        docker ps
      displayName: Deploy Container